services:
  - type: web
    name: corporate-debt-trends
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir dashboard --bind 0.0.0.0:$PORT app:server
    envVars:
      # Python runtime pinned to match local dev
      - key: PYTHON_VERSION
        value: 3.11.9
      # GCP project that owns the BigQuery datasets
      - key: GCP_PROJECT
        sync: false
      # Service-account key as base64-encoded JSON (not a file path).
      # Generate with:  base64 -i <keyfile>.json | tr -d '\n'
      # then paste the output into this value in the Render dashboard.
      # Raw (un-encoded) JSON is also accepted by the app.
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
